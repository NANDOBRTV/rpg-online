services:
  - type: web
    name: rpg-online
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/game.db
    disk:
      name: game-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
