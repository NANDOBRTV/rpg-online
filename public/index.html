<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon-Grid Strider</title>
    <style>
        /* Estilização Base */
        * { box-sizing: border-box; outline: none; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Courier New', monospace; 
        }

        /* O Canvas do Jogo */
        #gameCanvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
        }

        /* Interface de Usuário (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 20, 20, 0.8);
            padding: 15px;
            border-left: 4px solid #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .label { font-size: 0.7em; color: #555; display: block; }
        .value { font-size: 1.1em; font-weight: bold; }

        /* Efeito de Scanlines (Linhas de TV antiga) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div id="hud">
        <span class="label">SYSTEM STATUS</span>
        <div id="status" class="value">CONNECTING...</div>
        <br>
        <span class="label">COORDINATES</span>
        <div id="debug" class="value">X:0 Y:0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
